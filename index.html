<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Absensi Pamili Garmen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565C0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
body{font-family:system-ui;background:#E3F2FD}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
.btn{padding:12px;border-radius:12px;font-weight:600;width:100%;display:flex;gap:8px;justify-content:center;align-items:center}
.btn-primary{background:#1565C0;color:#fff}
.btn-primary:active{transform:scale(.98)}
.hidden{display:none}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400}
</style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen">
<!-- LOGIN -->
<div id="login">
  <div class="card mt-16 text-center">
    <div class="w-16 h-16 mx-auto mb-3 rounded-2xl bg-[#1565C0] flex items-center justify-center">
      <span class="material-symbols-rounded text-white" style="font-size:32px">apparel</span>
    </div>
    <h1 class="text-2xl font-bold text-[#0D47A1] mb-1">PAMILI GARMEN</h1>
    <p class="text-sm text-gray-500 mb-6">Sistem Absensi Karyawan</p>
    <input id="u" placeholder="Username" class="w-full p-3 border border-gray-200 rounded-xl mb-2 text-center">
    <input id="p" type="password" placeholder="Password" class="w-full p-3 border border-gray-200 rounded-xl mb-4 text-center">
    <button id="loginBtn" class="btn btn-primary"><span class="material-symbols-rounded">login</span>Masuk</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="flex justify-between items-center mb-4">
    <div>
      <p class="text-sm text-gray-600">Halo,</p>
      <p id="nm" class="font-bold text-lg text-[#0D47A1]"></p>
    </div>
    <img id="fp" src="https://via.placeholder.com/44" class="w-11 h-11 rounded-2xl object-cover border-2 border-white shadow">
  </div>

  <div class="card text-center">
    <p class="text-xs text-gray-500" id="tgl"></p>
    <p class="text-3xl font-light my-1" id="jam">--:--:--</p>
    <p id="st" class="text-sm mb-3 text-gray-600">Belum absen hari ini</p>
    <button id="abs" class="btn btn-primary"><span class="material-symbols-rounded">photo_camera</span><span>Absen Masuk</span></button>
  </div>

  <div id="cam" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
    <div class="flex-1 relative">
      <video id="v" autoplay playsinline class="w-full h-full object-cover"></video>
      <canvas id="c" class="hidden"></canvas>
      <div class="absolute top-5 left-5 right-5 flex justify-between">
        <button id="cancel" class="w-10 h-10 rounded-xl bg-black/50 text-white flex items-center justify-center"><span class="material-symbols-rounded">close</span></button>
        <div id="gpsInfo" class="px-3 py-1.5 rounded-xl bg-black/50 text-white text-xs">Mencari GPS...</div>
      </div>
    </div>
    <div class="p-6 bg-black">
      <button id="snap" class="w-20 h-20 mx-auto rounded-full border-4 border-white/30 flex items-center justify-center"><div class="w-16 h-16 rounded-full bg-white"></div></button>
    </div>
  </div>

  <div class="card">
    <h3 class="font-bold mb-3 flex items-center gap-2 text-[#1565C0]"><span class="material-symbols-rounded">history</span>Rekap 7 Hari</h3>
    <div id="rk" class="space-y-2 text-sm"></div>
  </div>
</div>

<div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-4 py-2 rounded-xl bg-gray-900 text-white text-sm hidden z-[60]"></div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbyQrjOZz_KQcPTSyUo8XOVoIYJFcHVzdhPetDOeDn342rv8UoabKhU_CNjJzXPbAiDZ/exec';
let user = null;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2000)}
function jam(){const n=new Date();document.getElementById('jam').textContent=n.toLocaleTimeString('id-ID',{hour12:false});document.getElementById('tgl').textContent=n.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'})}setInterval(jam,1000);jam();

// LOGIN
document.getElementById('loginBtn').onclick = async () => {
  const u = document.getElementById('u').value.toLowerCase().trim();
  const p = document.getElementById('p').value;
  if(!u||!p) return toast('Isi username & password');
  document.getElementById('loginBtn').innerHTML = '<span class="material-symbols-rounded animate-spin">progress_activity</span>Memeriksa';
  try{
    const r = await fetch(URL,{method:'POST',body:JSON.stringify({action:'login',username:u,password:p})});
    const j = await r.json();
    if(j.status==='sukses'){
      user=j.data;localStorage.setItem('pg',JSON.stringify(user));
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('nm').textContent=user.nama;
      if(user.fotoProfil) document.getElementById('fp').src=user.fotoProfil;
      load();
    }else toast(j.pesan);
  }catch{toast('Gagal terhubung')}
  document.getElementById('loginBtn').innerHTML = '<span class="material-symbols-rounded">login</span>Masuk';
};
if(localStorage.getItem('pg')){user=JSON.parse(localStorage.getItem('pg'));document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('nm').textContent=user.nama;if(user.fotoProfil)document.getElementById('fp').src=user.fotoProfil;load()}

// KAMERA
document.getElementById('abs').onclick = () => {
  document.getElementById('cam').classList.remove('hidden');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}})
    .then(s=>{document.getElementById('v').srcObject=s;getGPS()})
    .catch(()=>toast('Kamera tidak diizinkan'));
};
document.getElementById('cancel').onclick = () => {
  document.getElementById('cam').classList.add('hidden');
  const v=document.getElementById('v');if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
};
let currentGPS={lat:'-',lng:'-'};
function getGPS(){
  navigator.geolocation.getCurrentPosition(p=>{
    currentGPS={lat:p.coords.latitude.toFixed(6),lng:p.coords.longitude.toFixed(6)};
    document.getElementById('gpsInfo').textContent=`${currentGPS.lat}, ${currentGPS.lng}`;
  },()=>{document.getElementById('gpsInfo').textContent='GPS off'},{enableHighAccuracy:true});
}

// SNAP DENGAN ALAMAT
document.getElementById('snap').onclick = async () => {
  const v = document.getElementById('v');
  const c = document.getElementById('c');
  
  const max = 1280;
  let w = v.videoWidth, h = v.videoHeight;
  if (w > max) { h = (h * max) / w; w = max; }
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(v, 0, 0, w, h);
  
  // Ambil alamat
  let alamat = '';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentGPS.lat}&lon=${currentGPS.lng}&zoom=18&addressdetails=1`,{headers:{'Accept-Language':'id'}});
    const data = await res.json();
    alamat = data.display_name || '';
    if (alamat.length > 85) alamat = alamat.substring(0,82)+'...';
  } catch { alamat = 'Alamat tidak tersedia'; }
  
  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
  const jam = now.toLocaleTimeString('id-ID',{hour12:false});
  
  const bar = Math.max(110, h*0.22);
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, h-bar, w, bar);
  
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${Math.floor(bar*0.23)}px sans-serif`;
  ctx.fillText(user.nama, 24, h-bar+28);
  
  ctx.font = `${Math.floor(bar*0.19)}px sans-serif`;
  ctx.fillText(`${tgl} ${jam} WIB`, 24, h-bar+54);
  
  ctx.font = `${Math.floor(bar*0.17)}px sans-serif`;
  ctx.fillText(alamat, 24, h-bar+78);
  
  ctx.font = `${Math.floor(bar*0.15)}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(`GPS: ${currentGPS.lat}, ${currentGPS.lng} • Pamili Garmen`, 24, h-14);
  
  const foto = c.toDataURL('image/jpeg', 0.84);
  
  document.getElementById('cancel').click();
  toast('Mengirim absen...');
  
  const tipe = document.getElementById('abs').innerText.includes('Masuk') ? 'in' : 'out';
  try{
    await fetch(URL,{method:'POST',body:JSON.stringify({action:'absen',nama:user.nama,tipe,jam,lat:currentGPS.lat,lng:currentGPS.lng,foto})});
    toast('Absen berhasil');
    document.getElementById('st').textContent = tipe==='in' ? 'Sudah absen masuk' : 'Sudah absen pulang';
    document.getElementById('abs').innerHTML = `<span class="material-symbols-rounded">photo_camera</span><span>${tipe==='in'?'Absen Pulang':'Selesai'}</span>`;
    load();
  }catch{toast('Gagal kirim')}
};

async function load(){
  try{
    const r = await fetch(URL,{method:'POST',body:JSON.stringify({action:'rekap',nama:user.nama})});
    const j = await r.json();
    if(j.status==='sukses'){
      document.getElementById('rk').innerHTML = j.data.map(x=>`
        <div class="flex justify-between py-2 px-3 rounded-lg bg-gray-50">
          <span>${x.tanggal}</span>
          <span class="font-mono">${x.masuk||'--:--'} / ${x.pulang||'--:--'}</span>
        </div>`).join('');
    }
  }catch{}
}
</script>
</body>
</html>
