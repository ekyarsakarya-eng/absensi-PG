<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d415a"/>
  <link rel="manifest" href="manifest.json">
  <title>Absensi Pamili</title>
  <style>
    body{font-family:sans-serif;text-align:center;padding:20px;background:#f5f5f5}
   .card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);max-width:400px;margin:auto}
    video{width:100%;border-radius:8px;margin:10px 0}
    button{width:48%;padding:15px;margin:5px 1%;border:none;border-radius:8px;font-size:16px;font-weight:bold}
   .in{background:#28a745;color:white}.out{background:#dc3545;color:white}
    select{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
    #status{margin-top:15px;font-weight:bold;min-height:20px}
  </style>
</head>
<body>
  <div class="card">
    <h3>ABSENSI PAMILI GARMEN</h3>
    <select id="nama"></select>
    <video id="kamera" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button class="in" onclick="prosesAbsen('in')">CHECK IN</button>
    <button class="out" onclick="prosesAbsen('out')">CHECK OUT</button>
    <p id="status"></p>
  </div>
<script src="app.js"></script>
</body>
</html>
