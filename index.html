<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B63F3">
<title>Absensi Pamili Garmen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff}
.page{display:none;min-height:100vh}
.page.active{display:block}
.header{background:linear-gradient(135deg,#0B63F3,#4A90E2);color:#fff;padding:20px;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:14px;opacity:.9;margin-top:4px}
.content{padding:20px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#0B63F3;color:#fff}
.btn-success{background:#28a745;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;color:#666;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}
.form-group input:focus{outline:none;border-color:#0B63F3}
.input-wrap{position:relative}
.input-wrap input{padding-right:40px}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:20px;color:#999}
.camera-container{position:relative;width:100%;max-width:400px;margin:0 auto}
#video{width:100%;border-radius:12px;background:#000}
#canvas{display:none}
.camera-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:250px;height:250px;border:3px solid #0B63F3;border-radius:50%;pointer-events:none}
.camera-controls{display:flex;gap:12px;margin-top:16px}
.camera-controls button{flex:1}
.location-info{background:#E3F2FD;border-radius:8px;padding:12px;margin:16px 0;display:flex;align-items:center;gap:8px}
.location-info.success{background:#D4EDDA;color:#155724}
.location-info.error{background:#F8D7DA;color:#721C24}
.tabs{display:flex;background:#f5f5f5;border-radius:8px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:10px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;transition:all .3s}
.tab.active{background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px;border-radius:12px}
.stat-card.blue{background:linear-gradient(135deg,#0B63F3,#4A90E2)}
.stat-card.green{background:linear-gradient(135deg,#28a745,#20c997)}
.stat-label{font-size:12px;opacity:.9}
.stat-value{font-size:28px;font-weight:700;margin-top:4px}
.alert{padding:12px;border-radius:8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert-success{background:#D4EDDA;color:#155724}
.alert-error{background:#F8D7DA;color:#721C24}
.alert-warning{background:#FFF3CD;color:#856404}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;max-width:480px;margin:0 auto}
.nav-item{flex:1;padding:12px;text-align:center;cursor:pointer;transition:all .3s}
.nav-item.active{color:#0B63F3}
.nav-item:active{background:#f5f5f5}
.nav-icon{font-size:24px}
.nav-label{font-size:11px;margin-top:4px}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999}
.loading.active{display:flex}
.spinner{width:50px;height:50px;border:4px solid #fff;border-top-color:#0B63F3;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.profil-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.profil-foto{width:80px;height:80px;border-radius:50%;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:32px;color:#0B63F3;overflow:hidden}
.profil-foto img{width:100%;height:100%;object-fit:cover}
.profil-info h2{font-size:18px;margin-bottom:4px}
.profil-info p{font-size:14px;color:#666}
.hidden{display:none!important}
/* LOGIN PAGE KHUSUS */
#loginPage{background:#f5f5f5;display:flex;align-items:center;justify-content:center}
#loginPage .login-wrap{width:100%;max-width:360px;padding:20px}
#loginPage .card{padding:32px 24px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
#loginPage h2{text-align:center;color:#0B63F3;font-size:24px;font-weight:700;margin-bottom:8px}
#loginPage .subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:32px}
#loginPage .form-group input{border:1px solid #E0E0E0;background:#FAFAFA}
#loginPage .btn-primary{border-radius:8px;padding:16px;font-size:16px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Login Page -->
  <div class="page active" id="loginPage">
    <div class="login-wrap">
      <div class="card">
        <h2>PAMILI GARMEN</h2>
        <p class="subtitle">Sistem Absensi Karyawan</p>
        <form id="loginForm">
          <div class="form-group">
            <div class="input-wrap">
              <input type="text" id="username" placeholder="Username" required autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <div class="input-wrap">
              <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
              <span class="toggle-pass" id="togglePass">👁️‍🗨️</span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div id="loginAlert" class="alert alert-error hidden" style="margin-top:16px"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div class="page" id="mainPage">
    <div class="header">
      <h1>Halo, <span id="namaUser">User</span>!</h1>
      <p id="tanggalHari">Loading...</p>
    </div>
    
    <!-- Absen Page -->
    <div class="content" id="absenPage">
      <div class="card">
        <h3 style="margin-bottom:16px">Absensi Hari Ini</h3>
        <div id="statusAbsen" class="alert alert-warning">
          ⏰ Belum absen masuk
        </div>
        <div class="camera-container">
          <video id="video" autoplay playsinline></video>
          <canvas id="canvas"></canvas>
          <div class="camera-overlay"></div>
        </div>
        <div id="locationInfo" class="location-info hidden"></div>
        <div class="camera-controls">
          <button class="btn btn-success" id="btnMasuk">✓ Masuk</button>
          <button class="btn btn-danger" id="btnPulang">✗ Pulang</button>
        </div>
      </div>
    </div>

    <!-- Rekap Page -->
    <div class="content hidden" id="rekapPage">
      <div class="card">
        <h3 style="margin-bottom:16px">📊 Rekap Absensi</h3>
        <div class="tabs">
          <div class="tab active" data-hari="7">7 Hari</div>
          <div class="tab" data-hari="14">14 Hari</div>
          <div class="tab" data-hari="30">30 Hari</div>
        </div>
        
        <div class="stats">
          <div class="stat-card blue">
            <div class="stat-label">Total Hadir</div>
            <div class="stat-value" id="totalMasuk">0</div>
            <div style="font-size:12px;margin-top:4px">Hari</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Check Out</div>
            <div class="stat-value" id="totalPulang">0</div>
            <div style="font-size:12px;margin-top:4px">Kali</div>
          </div>
        </div>
        
        <div id="rekapGrid"></div>
      </div>
    </div>

    <!-- Profil Page -->
    <div class="content hidden" id="profilPage">
      <div class="card">
        <div class="profil-header">
          <div class="profil-foto" id="profilFoto">👤</div>
          <div class="profil-info">
            <h2 id="profilNama">Loading...</h2>
            <p id="profilUsername">@username</p>
          </div>
        </div>
        <button class="btn btn-primary" id="btnEditProfil">Edit Profil</button>
        <button class="btn" style="background:#6c757d;color:#fff;margin-top:8px" id="btnGantiPass">Ganti Password</button>
        <button class="btn btn-danger" style="margin-top:8px" id="btnLogout">Keluar</button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-item active" data-page="absen">
        <div class="nav-icon">📷</div>
        <div class="nav-label">Absen</div>
      </div>
      <div class="nav-item" data-page="rekap">
        <div class="nav-icon">📊</div>
        <div class="nav-label">Rekap</div>
      </div>
      <div class="nav-item" data-page="profil">
        <div class="nav-icon">👤</div>
        <div class="nav-label">Profil</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Edit Profil -->
<div class="page" id="editProfilPage" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:20px;max-width:400px;width:90%;max-height:90vh;overflow-y:auto">
    <h3 style="margin-bottom:16px">Edit Profil</h3>
    <div class="form-group">
      <label>Foto Profil</label>
      <input type="file" id="inputFotoProfil" accept="image/*">
    </div>
    <div class="form-group">
      <label>No HP</label>
      <input type="tel" id="inputNoHp" placeholder="08xxxxxxxxxx">
    </div>
    <div class="form-group">
      <label>Alamat</label>
      <input type="text" id="inputAlamat" placeholder="Alamat lengkap">
    </div>
    <button class="btn btn-primary" id="btnSimpanProfil">Simpan</button>
    <button class="btn" style="background:#6c757d;color:#fff;margin-top:8px" id="btnBatalProfil">Batal</button>
  </div>
</div>

<!-- Modal Ganti Password -->
<div class="page" id="gantiPassPage" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:20px;max-width:400px;width:90%">
    <h3 style="margin-bottom:16px">Ganti Password</h3>
    <div class="form-group">
      <label>Password Lama</label>
      <input type="password" id="passLama">
    </div>
    <div class="form-group">
      <label>Password Baru</label>
      <input type="password" id="passBaru">
    </div>
    <div class="form-group">
      <label>Konfirmasi Password Baru</label>
      <input type="password" id="passBaru2">
    </div>
    <button class="btn btn-primary" id="btnSimpanPass">Simpan</button>
    <button class="btn" style="background:#6c757d;color:#fff;margin-top:8px" id="btnBatalPass">Batal</button>
  </div>
</div>

<script src="app.js"></script>
<script>
// Toggle password
document.getElementById('togglePass').addEventListener('click',function(){
  const pass=document.getElementById('password');
  if(pass.type=='password'){pass.type='text';this.textContent='👁️'}
  else{pass.type='password';this.textContent='👁️‍🗨️'}
});
</script>
</body>
</html>
