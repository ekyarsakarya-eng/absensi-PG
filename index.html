<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Absensi Pamili Garmen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5A6C7D">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root{--bg:#F6F8FA;--card:#FFFFFF;--primary:#5A6C7D;--primary-light:#7A8FA6;--accent:#E8ECF1;--text:#2D3748;--muted:#718096;--border:#E2E8F0}
body{font-family:'Outfit',system-ui;background:var(--bg);color:var(--text)}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 300}
.card{background:var(--card);border-radius:20px;box-shadow:0 4px 20px rgba(90,108,125,.06);border:1px solid var(--border)}
.btn{padding:14px 20px;border-radius:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary-light),var(--primary));color:white;box-shadow:0 4px 12px rgba(90,108,125,.2)}
.btn-primary:active{transform:scale(.98)}
.btn-soft{background:var(--accent);color:var(--primary)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;color:var(--muted);font-size:12px}
.nav-item.active{color:var(--primary)}
.nav-item .material-symbols-rounded{font-size:24px}
.input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:#FAFBFC;font-size:15px}
.input:focus{outline:none;border-color:var(--primary-light);background:white}
.hidden{display:none}
.soft-shadow{box-shadow:0 8px 30px rgba(90,108,125,.08)}
</style>
</head>
<body class="max-w-[420px] mx-auto min-h-screen">
<!-- LOGIN -->
<div id="loginView" class="min-h-screen flex flex-col justify-center p-6">
  <div class="text-center mb-10">
    <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-[#7A8FA6] to-[#5A6C7D] flex items-center justify-center soft-shadow">
      <span class="material-symbols-rounded text-white" style="font-size:40px">apparel</span>
    </div>
    <h1 class="text-[28px] font-light tracking-wide" style="color:var(--primary)">PAMILI</h1>
    <p class="text-sm" style="color:var(--muted)">Garmen Absensi</p>
  </div>
  <div class="card p-6">
    <div class="space-y-4">
      <div><label class="text-xs text-[var(--muted)] mb-1 block">Username</label><input id="inpUser" class="input" placeholder="nama kamu"></div>
      <div><label class="text-xs text-[var(--muted)] mb-1 block">Password</label><input id="inpPass" type="password" class="input" placeholder="•••••"></div>
      <button id="btnLogin" class="btn btn-primary w-full mt-2"><span class="material-symbols-rounded">login</span>Masuk</button>
    </div>
  </div>
  <p class="text-center text-xs mt-8" style="color:var(--muted)">Versi 3.0 • Soft Edition</p>
</div>

<!-- APP -->
<div id="appView" class="hidden min-h-screen pb-24">
  <!-- Header -->
  <div class="px-6 pt-8 pb-4">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-sm" style="color:var(--muted)">Selamat datang</p>
        <h2 id="txtNama" class="text-xl font-medium"></h2>
      </div>
      <div class="relative">
        <img id="imgProfil" src="https://via.placeholder.com/48x48.png?text=PG" class="w-12 h-12 rounded-2xl object-cover border-2 border-white soft-shadow">
        <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-400 rounded-full border-2 border-white"></div>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="homeView" class="px-6 space-y-4">
    <div class="card p-6 text-center">
      <p class="text-xs mb-1" style="color:var(--muted)" id="txtTanggal"></p>
      <p class="text-3xl font-light mb-4" id="txtJam">--:--</p>
      <div id="statusBox" class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm mb-4" style="background:var(--accent);color:var(--primary)">
        <span class="material-symbols-rounded text-[18px]">schedule</span><span id="txtStatus">Menunggu absen</span>
      </div>
      <button id="btnAbsen" class="btn btn-primary w-full"><span class="material-symbols-rounded">photo_camera</span><span id="txtBtnAbsen">Absen Masuk</span></button>
    </div>

    <div class="card p-5">
      <h3 class="font-medium mb-3 flex items-center gap-2"><span class="material-symbols-rounded" style="color:var(--primary)">history</span>Riwayat Hari Ini</h3>
      <div id="riwayatHariIni" class="space-y-2 text-sm"></div>
    </div>
  </div>

  <!-- REKAP -->
  <div id="rekapView" class="hidden px-6">
    <div class="card p-5">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-medium">Rekap Presensi</h3>
        <select id="selPeriode" class="text-xs px-3 py-1.5 rounded-lg border" style="border-color:var(--border);background:var(--accent)">
          <option>7 Hari</option><option>14 Hari</option><option>30 Hari</option>
        </select>
      </div>
      <div id="listRekap" class="space-y-2"></div>
    </div>
  </div>

  <!-- PROFIL -->
  <div id="profilView" class="hidden px-6 space-y-4">
    <div class="card p-6 text-center">
      <div class="relative w-24 h-24 mx-auto mb-3">
        <img id="profFoto" src="https://via.placeholder.com/96" class="w-24 h-24 rounded-3xl object-cover">
        <button id="btnGantiFoto" class="absolute bottom-0 right-0 w-8 h-8 rounded-xl bg-white shadow flex items-center justify-center"><span class="material-symbols-rounded text-[18px]" style="color:var(--primary)">edit</span></button>
        <input type="file" id="inpFoto" accept="image/*" class="hidden">
      </div>
      <h3 id="profNama" class="font-medium"></h3>
      <p class="text-xs" style="color:var(--muted)" id="profUser"></p>
    </div>
    <div class="card p-5 space-y-3">
      <div><label class="text-xs" style="color:var(--muted)">No HP</label><input id="inpHp" class="input mt-1"></div>
      <div><label class="text-xs" style="color:var(--muted)">Alamat</label><textarea id="inpAlamat" class="input mt-1" rows="2"></textarea></div>
      <button id="btnSimpanProfil" class="btn btn-soft w-full">Simpan Perubahan</button>
    </div>
    <div class="card p-5">
      <h4 class="font-medium mb-3">Ganti Password</h4>
      <div class="space-y-2">
        <input id="inpPassLama" type="password" class="input" placeholder="Password lama">
        <input id="inpPassBaru" type="password" class="input" placeholder="Password baru">
        <button id="btnGantiPass" class="btn btn-soft w-full">Update Password</button>
      </div>
    </div>
    <button id="btnLogout" class="w-full py-3 text-sm" style="color:var(--muted)">Keluar</button>
  </div>

  <!-- KAMERA -->
  <div id="kameraView" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
    <div class="flex-1 relative">
      <video id="vid" autoplay playsinline class="w-full h-full object-cover"></video>
      <canvas id="canv" class="hidden"></canvas>
      <div class="absolute top-6 left-6 right-6 flex justify-between">
        <button id="btnTutupKam" class="w-10 h-10 rounded-2xl bg-black/40 backdrop-blur flex items-center justify-center text-white"><span class="material-symbols-rounded">close</span></button>
        <div class="px-3 py-1.5 rounded-xl bg-black/40 backdrop-blur text-white text-xs" id="lblGps">Mencari GPS...</div>
      </div>
    </div>
    <div class="p-6 bg-gradient-to-t from-black to-transparent">
      <button id="btnJepret" class="w-20 h-20 mx-auto rounded-full border-4 border-white/30 flex items-center justify-center"><div class="w-16 h-16 rounded-full bg-white"></div></button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="bottomNav" class="fixed bottom-0 left-0 right-0 max-w-[420px] mx-auto bg-white/80 backdrop-blur-xl border-t hidden" style="border-color:var(--border)">
  <div class="flex">
    <button class="nav-item active" data-view="home"><span class="material-symbols-rounded">home</span><span>Home</span></button>
    <button class="nav-item" data-view="rekap"><span class="material-symbols-rounded">calendar_month</span><span>Rekap</span></button>
    <button class="nav-item" data-view="profil"><span class="material-symbols-rounded">person</span><span>Profil</span></button>
  </div>
</div>

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl bg-[#2D3748] text-white text-sm shadow-lg hidden z-50"></div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/GANTI_DENGAN_URL_ANDA/exec';
let currentUser=null, currentGps={lat:'-',lng:'-'};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2500)}
function $(id){return document.getElementById(id)}
function updateJam(){const n=new Date();$('txtJam').textContent=n.toLocaleTimeString('id-ID',{hour12:false});$('txtTanggal').textContent=n.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'})}setInterval(updateJam,1000);updateJam();

// LOGIN
$('btnLogin').onclick=async()=>{const u=$('inpUser').value.trim().toLowerCase();const p=$('inpPass').value;if(!u||!p)return toast('Isi username & password');$('btnLogin').innerHTML='<span class="material-symbols-rounded animate-spin">progress_activity</span>Memeriksa';try{const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'login',username:u,password:p})});const j=await r.json();if(j.status==='sukses'){currentUser=j.data;localStorage.setItem('pg_user',JSON.stringify(currentUser));masukApp()}else toast(j.pesan)}catch{toast('Gagal terhubung')}finally{$('btnLogin').innerHTML='<span class="material-symbols-rounded">login</span>Masuk'}};
function masukApp(){$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('bottomNav').classList.remove('hidden');$('txtNama').textContent=currentUser.nama;$('profNama').textContent=currentUser.nama;$('profUser').textContent='@'+currentUser.username;if(currentUser.fotoProfil){$('imgProfil').src=currentUser.fotoProfil;$('profFoto').src=currentUser.fotoProfil}loadRekap();loadProfil()}
if(localStorage.getItem('pg_user')){currentUser=JSON.parse(localStorage.getItem('pg_user'));masukApp()}

// NAV
document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','rekap','profil'].forEach(v=>$(v+'View').classList.add('hidden'));$(b.dataset.view+'View').classList.remove('hidden')});

// ABSEN
$('btnAbsen').onclick=()=>bukaKamera();
function bukaKamera(){$('kameraView').classList.remove('hidden');navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:1280}}).then(s=>{$('vid').srcObject=s;ambilGps()}).catch(()=>toast('Kamera tidak izin'))}
$('btnTutupKam').onclick=tutupKamera;
function tutupKamera(){$('kameraView').classList.add('hidden');const v=$('vid');if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop())}
function ambilGps(){navigator.geolocation.getCurrentPosition(p=>{currentGps={lat:p.coords.latitude.toFixed(6),lng:p.coords.longitude.toFixed(6)};$('lblGps').textContent=`${currentGps.lat}, ${currentGps.lng}`},()=>{$('lblGps').textContent='GPS tidak aktif'},{enableHighAccuracy:true})}
$('btnJepret').onclick=async()=>{const v=$('vid'),c=$('canv');const max=1280;let w=v.videoWidth,h=v.videoHeight;if(w>max){h=h*max/w;w=max}c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.drawImage(v,0,0,w,h);const now=new Date();const tgl=now.toLocaleDateString('id-ID');const jam=now.toLocaleTimeString('id-ID',{hour12:false});const bar=Math.max(80,h*0.14);ctx.fillStyle='rgba(45,55,72,0.78)';ctx.fillRect(0,h-bar,w,bar);ctx.fillStyle='#F7FAFC';ctx.font=`600 ${Math.floor(bar*0.32)}px Outfit`;ctx.fillText(currentUser.nama,24,h-bar+32);ctx.font=`400 ${Math.floor(bar*0.26)}px Outfit`;ctx.fillText(`${tgl} • ${jam}`,24,h-bar+58);ctx.font=`300 ${Math.floor(bar*0.22)}px monospace`;ctx.fillText(`${currentGps.lat}, ${currentGps.lng} • Pamili Garmen`,24,h-16);const foto=c.toDataURL('image/jpeg',0.82);tutupKamera();kirimAbsen(foto)};

async function kirimAbsen(foto){const tipe=$('txtBtnAbsen').textContent.includes('Masuk')?'in':'out';toast('Mengirim absen...');try{const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'absen',nama:currentUser.nama,tipe,jam:new Date().toLocaleTimeString('id-ID',{hour12:false}),lat:currentGps.lat,lng:currentGps.lng,foto})});const j=await r.json();if(j.status==='sukses'){toast('Absen berhasil');$('txtStatus').textContent=tipe==='in'?'Sudah masuk':'Sudah pulang';$('txtBtnAbsen').textContent=tipe==='in'?'Absen Pulang':'Selesai';loadRekap()}else toast(j.pesan)}catch{toast('Gagal kirim')}}

// REKAP
async function loadRekap(){try{const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'rekap',nama:currentUser.nama})});const j=await r.json();if(j.status==='sukses'){const list=j.data.slice(0,7);$('listRekap').innerHTML=list.map(x=>`<div class="flex justify-between items-center py-2.5 px-3 rounded-xl" style="background:var(--accent)"><div><p class="text-xs" style="color:var(--muted)">${x.tanggal}</p><p class="text-[13px]">${x.masuk!=='-'?x.masuk:'--:--'} → ${x.pulang!=='-'?x.pulang:'--:--'}</p></div><span class="material-symbols-rounded" style="color:${x.masuk!=='-'?'#68A085':'var(--muted)'}">check_circle</span></div>`).join('');const today=list[0];$('riwayatHariIni').innerHTML=`<div class="flex justify-between"><span>Masuk</span><b>${today.masuk}</b></div><div class="flex justify-between"><span>Pulang</span><b>${today.pulang}</b></div>`;if(today.masuk!=='-'&&today.pulang==='-'){$('txtBtnAbsen').textContent='Absen Pulang';$('txtStatus').textContent='Sudah masuk'}}}}catch{}

// PROFIL
async function loadProfil(){try{const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'getProfil',nama:currentUser.nama})});const j=await r.json();if(j.status==='sukses'){$('inpHp').value=j.data.noHp||'';$('inpAlamat').value=j.data.alamat||'';if(j.data.fotoProfil){$('profFoto').src=j.data.fotoProfil;$('imgProfil').src=j.data.fotoProfil;currentUser.fotoProfil=j.data.fotoProfil;localStorage.setItem('pg_user',JSON.stringify(currentUser))}}}catch{}}
$('btnGantiFoto').onclick=()=>$('inpFoto').click();
$('inpFoto').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{$('profFoto').src=ev.target.result;$('profFoto').dataset.new=ev.target.result};r.readAsDataURL(f)};
$('btnSimpanProfil').onclick=async()=>{const foto=$('profFoto').dataset.new||'';toast('Menyimpan...');const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'updateProfil',nama:currentUser.nama,fotoProfil:foto,noHp:$('inpHp').value,alamat:$('inpAlamat').value})});const j=await r.json();toast(j.pesan);if(j.fotoUrl){$('imgProfil').src=j.fotoUrl;currentUser.fotoProfil=j.fotoUrl;localStorage.setItem('pg_user',JSON.stringify(currentUser))}};
$('btnGantiPass').onclick=async()=>{const lama=$('inpPassLama').value,baru=$('inpPassBaru').value;if(!lama||!baru)return toast('Isi semua');const r=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'gantiPassword',nama:currentUser.nama,passwordLama:lama,passwordBaru:baru})});const j=await r.json();toast(j.pesan);if(j.status==='sukses'){$('inpPassLama').value='';$('inpPassBaru').value=''}};
$('btnLogout').onclick=()=>{localStorage.removeItem('pg_user');location.reload()};
</script>
</body>
</html>
