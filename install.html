<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Install Absensi Terpadu</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565C0">
<style>
body{font-family:'Segoe UI',sans-serif;background:#F8FAFC;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
.card{background:white;padding:32px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;max-width:360px}
img{width:96px;height:96px;border-radius:24px;margin-bottom:16px}
h1{color:#1565C0;margin:0 0 8px;font-size:22px}
p{color:#64748b;margin:0 0 24px}
button{width:100%;padding:14px;background:#1565C0;color:white;border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer}
button:disabled{background:#ccc}
</style>
</head>
<body>
<div class="card">
<img src="icon-192.png" alt="icon">
<h1>Absensi Terpadu</h1>
<p>Install aplikasi untuk akses lebih cepat tanpa buka browser</p>
<button id="installBtn">Install Sekarang</button>
<p id="status" style="margin-top:12px;font-size:13px;color:#888"></p>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js')}
let deferredPrompt;
const btn=document.getElementById('installBtn');
const status=document.getElementById('status');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;btn.disabled=false;});
btn.onclick=async()=>{
 if(deferredPrompt){deferredPrompt.prompt();const c=await deferredPrompt.userChoice;status.textContent=c.outcome==='accepted'?'Terima kasih! Cek home screen':'Batal install';deferredPrompt=null}
 else{status.textContent='Buka di Chrome Android, atau klik ⋮ > Add to Home Screen';window.location.href='index.html'}
};
// auto redirect if already installed
window.addEventListener('appinstalled',()=>{window.location.href='index.html'});
</script>
</body>
</html>
